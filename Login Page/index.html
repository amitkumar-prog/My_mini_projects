<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">

        <h1 class="head">
            Login Form
        </h1>

        <form>
            <input type="email" placeholder=" Enter your email" class="email">
            <br>
            <br>
            <input type="password" placeholder=" Enter your password" class="password">
            <br>
            <br>
            <input type="checkbox" id="check"><label class ="check">Remember me</label>
            <label class="forget">Forget password?</label>
            <br>
            <br>

            <button class="login-btn">Login</button>

            <p class="p3">Don't have account?Register</p>

        </form>
        
    </div>    
</body>
</html>
